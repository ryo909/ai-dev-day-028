<!DOCTYPE html><html lang="ja"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Day028 — Slot Checklist Planner</title><meta name="description" content="時間枠とチェックリストを一体化した実行計画プランナー。（話題:GitHub Trending (A）"><link rel="stylesheet" href="/src/style.css"></head>
<body><div id="app"><h1>Slot Checklist Planner</h1><p>時間枠とチェックリストを一体化した実行計画プランナー。（話題:GitHub Trending (A）</p><div class="planner"><section class="panel"><h2>Add Task</h2><input id="taskInput" placeholder="タスク名"><select id="slotSelect"><option value="morning">Morning</option><option value="afternoon">Afternoon</option><option value="evening">Evening</option></select><button id="addTaskBtn">追加</button><button id="carryBtn">未完了を次枠へ繰越</button></section><section class="slots"><div class="slot"><h3>Morning</h3><div id="slotMorning"></div></div><div class="slot"><h3>Afternoon</h3><div id="slotAfternoon"></div></div><div class="slot"><h3>Evening</h3><div id="slotEvening"></div></div></section></div><p><a href="https://github.com/ryo909/ai-dev-day-028" target="_blank" rel="noopener">GitHub</a></p></div><script type="module" src="/src/main.js"></script></body></html>
